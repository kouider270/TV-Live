name: Daily IPTV Update

on:
  schedule:
    # سيتم التشغيل يومياً في الساعة 12 منتصف الليل بتوقيت جرينتش
    - cron: '0 0 * * *'
  workflow_dispatch: # يتيح لك تشغيل التحديث يدوياً إذا أردت

jobs:
  update-channels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        run: python update_channels.py  # تأكد أن هذا هو اسم ملف البايثون الخاص بك

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add streams/*.m3u
          git commit -m "Automated Daily IPTV Update" || exit 0
          git push
