<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBN STREAM TV | Premium Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#050a14;
            --sb:rgba(10, 14, 26, 0.98);
            --card:rgba(22, 27, 41, 0.9);
            --acc:#00d2ff;
            --txt:#f0f0f0;
            --brd:rgba(255,255,255,0.1);
        }
        
        body{background:#000;color:var(--txt);height:100vh;font-family:system-ui;overflow:hidden; cursor: none;}

        /* --- شاشة الترحيب (التي لم تظهر) --- */
        #splash-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo { 
            max-width: 400px; width: 70%; 
            filter: drop-shadow(0 0 30px var(--acc)); 
            animation: pulse 2s infinite ease-in-out; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
        .fade-out { opacity: 0; visibility: hidden; }

        /* مشغل الفيديو */
        .player-container {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background: #000; z-index: 1; display: flex; align-items: center; justify-content: center;
        }
        #vid { width: 100%; height: 100%; object-fit: contain; }

        /* واجهة التحكم */
        .ui-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; pointer-events: none;
            transition: opacity 0.5s ease; opacity: 0; visibility: hidden;
        }
        body.ui-visible .ui-overlay { opacity: 1; visibility: visible; pointer-events: auto; }

        .sidebar {
            width: 150px; background: var(--sb); border-left: 1px solid var(--brd); 
            display: flex; flex-direction: column; gap: 15px; 
            padding: 100px 10px 30px; overflow-y: auto; height: 100vh;
            transform: translateX(100%); transition: transform 0.4s ease;
        }

        .ch-list {
            width: 400px; background: rgba(15, 20, 35, 0.95); border-left: 1px solid var(--brd); 
            padding: 100px 20px 20px; overflow-y: auto; height: 100vh;
            transform: translateX(100%); transition: transform 0.5s ease;
        }
        body.ui-visible .sidebar, body.ui-visible .ch-list { transform: translateX(0); }

        /* أزرار الريموت */
        .cat-btn, .ch-item {
            background: var(--card); border: 1px solid var(--brd); border-radius: 12px;
            padding: 15px; cursor: pointer; transition: 0.2s; outline: none; flex-shrink: 0;
            text-align: center;
        }
        .cat-btn:focus, .ch-item:focus {
            background: var(--acc) !important; color: #000 !important;
            transform: scale(1.08); border: 3px solid #fff; box-shadow: 0 0 20px var(--acc);
        }

        .header {
            position: fixed; top: 0; right: 0; left: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            z-index: 110; transform: translateY(-100%); transition: transform 0.4s ease;
        }
        body.ui-visible .header { transform: translateY(0); }
        .header-logo { height: 40px; }

        #loading { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--acc); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="toggleUI()">

    <!-- شاشة الترحيب (تم إصلاحها) -->
    <div id="splash-screen">
        <img src="logo.png" alt="KBN Logo" class="splash-logo" onerror="this.src='https://via.placeholder.com/400x200?text=KBN+STREAM'">
        <div style="margin-top:20px; color:var(--acc); letter-spacing:3px; font-weight:bold;">PREMIUM TV SERVICE</div>
    </div>

    <div class="player-container">
        <div id="loading"><div class="spinner"></div></div>
        <video id="vid" autoplay playsinline></video>
    </div>

    <div class="header">
        <img src="logo.png" alt="KBN" class="header-logo" onerror="this.style.display='none'">
        <div id="scanStatus" style="font-size:12px; color:var(--acc); font-weight:bold;">KBN STREAM | TV MODE</div>
    </div>

    <div class="ui-overlay">
        <div class="sidebar" id="sidebar" onclick="event.stopPropagation()"></div>
        <div class="ch-list" id="chList" onclick="event.stopPropagation()">
            <div id="channelsContainer"></div>
        </div>
    </div>

<script>
    const countries = [
        { id: 'dz', name: 'الجزائر', flag: '🇩🇿' },
        { id: 'sa', name: 'السعودية', flag: '🇸🇦' },
        { id: 'qa', name: 'قطر', flag: '🇶🇦' },
        { id: 'ma', name: 'المغرب', flag: '🇲🇦' },
         { id: 'tn', name: 'تونس', flag: 'TN },
        { id: 'eg', name: 'مصر', flag: '🇪🇬' },
        { id: 'ps', name: 'فلسطين', flag: '🇵🇸' },
        { id: 'fr', name: 'فرنسا', flag: '🇫🇷' },
        { id: 'be', name: 'بلجيكا', flag: '🇧🇪' }
       
    ];

    let hls = null;
    let currentChannels = [];

    // إدارة شاشة الترحيب
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('fade-out');
            init(); // بدء تحميل القنوات بعد الترحيب
        }, 3000); // تظهر لمدة 3 ثواني
    };

    function toggleUI() { 
        document.body.classList.toggle('ui-visible'); 
        if(document.body.classList.contains('ui-visible')) {
            setTimeout(() => {
                const firstBtn = document.querySelector('.cat-btn');
                if(firstBtn) firstBtn.focus();
            }, 200);
        }
    }

    async function init() {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = "";
        for (const c of countries) {
            try {
                const res = await fetch(`streams/${c.id}.m3u`, { method: 'HEAD' });
                if (res.ok) {
                    const btn = document.createElement('div');
                    btn.className = 'cat-btn';
                    btn.setAttribute('tabindex', '0');
                    btn.innerHTML = `<span>${c.flag}</span><br><span>${c.name}</span>`;
                    btn.onclick = (e) => { e.stopPropagation(); loadM3U(c.id, btn); };
                    sidebar.appendChild(btn);
                }
            } catch(e) {}
        }
    }

    async function loadM3U(id, btn) {
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(`streams/${id}.m3u`);
            const text = await res.text();
            parseM3U(text);
        } catch(e) {}
        finally { document.getElementById('loading').style.display = 'none'; }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        currentChannels = [];
        let name = "";
        lines.forEach(line => {
            line = line.trim();
            if (line.includes('#EXTINF:')) name = line.split(',')[1] || "قناة";
            else if (line.startsWith('http')) currentChannels.push({ n: name, h: line });
        });
        displayChannels();
    }

    function displayChannels() {
        const container = document.getElementById('channelsContainer');
        container.innerHTML = '';
        currentChannels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'ch-item';
            div.setAttribute('tabindex', '0');
            div.innerHTML = `<b>▶</b> <span>${ch.n}</span>`;
            div.onclick = (e) => { e.stopPropagation(); play(ch.h); };
            container.appendChild(div);
        });
        if(container.firstChild) container.firstChild.focus();
    }

    function play(url) {
        const vid = document.getElementById('vid');
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
        } else { vid.src = url; vid.play(); }
        document.body.classList.remove('ui-visible');
    }

    // نظام الريموت المتقدم
    document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        
        switch(e.key) {
            case 'Enter': active.click(); break;
            case 'ArrowDown':
                const next = active.nextElementSibling;
                if(next) next.focus();
                break;
            case 'ArrowUp':
                const prev = active.previousElementSibling;
                if(prev) prev.focus();
                break;
            case 'ArrowLeft':
                const sidebarBtn = document.querySelector('.cat-btn');
                if(sidebarBtn) sidebarBtn.focus();
                break;
            case 'ArrowRight':
                const channelBtn = document.querySelector('.ch-item');
                if(channelBtn) channelBtn.focus();
                break;
            case 'Escape':
            case 'Backspace':
                if(document.body.classList.contains('ui-visible')) {
                    document.body.classList.remove('ui-visible');
                } else {
                    toggleUI(); // فتح القائمة عند الضغط على رجوع أثناء المشاهدة
                }
                break;
        }
    });
</script>
</body>
</html>
