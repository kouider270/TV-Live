<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBN STREAM | البث السينمائي</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        /* التنسيق الأساسي والألوان المستوحاة من الشعار */
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#050a14;
            --sb:rgba(10, 14, 26, 0.96);
            --card:rgba(22, 27, 41, 0.85);
            --acc:#00d2ff; /* لون التوهج الأزرق في الشعار */
            --txt:#f0f0f0;
            --brd:rgba(255,255,255,0.1);
        }
        
        body{background:#000;color:var(--txt);height:100vh;font-family:system-ui;overflow:hidden;}

        /* شاشة الترحيب بالشعار الكبير */
        #splash-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 1s ease, visibility 1s;
        }
        .splash-logo { 
            max-width: 500px; width: 85%; 
            filter: drop-shadow(0 0 30px var(--acc)); 
            animation: pulse 2s infinite ease-in-out; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
        .fade-out { opacity: 0; visibility: hidden; }

        /* مشغل الفيديو (ملء الشاشة خلفية) */
        .player-container {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background: #000; z-index: 1; display: flex; align-items: center; justify-content: center;
        }
        #vid { width: 100%; height: 100%; object-fit: contain; cursor: pointer; background: #000; }

        /* واجهة التحكم العائمة */
        .ui-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; pointer-events: none;
            transition: opacity 0.5s ease;
            opacity: 0; visibility: hidden;
        }
        body.ui-visible .ui-overlay { opacity: 1; visibility: visible; pointer-events: auto; }

        /* القوائم الجانبية */
        .sidebar {
            width: 120px; background: var(--sb); backdrop-filter: blur(15px);
            border-left: 1px solid var(--brd); display: flex; flex-direction: column;
            gap: 12px; padding: 25px 10px; overflow-y: auto;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ch-list {
            width: 320px; background: rgba(15, 20, 35, 0.92); backdrop-filter: blur(20px);
            border-left: 1px solid var(--brd); padding: 20px; overflow-y: auto;
            transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.ui-visible .sidebar, body.ui-visible .ch-list { transform: translateX(0); }

        /* الهيدر العلوي */
        .header {
            position: fixed; top: 0; right: 0; left: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            z-index: 110; transform: translateY(-100%); transition: transform 0.4s ease;
        }
        body.ui-visible .header { transform: translateY(0); }
        .header-logo { height: 45px; filter: drop-shadow(0 0 10px var(--acc)); }

        /* الأزرار والعناصر التفاعلية */
        .cat-btn {
            background: var(--card); border: 1px solid var(--brd); border-radius: 15px;
            padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.3s;
            color: #ccc;
        }
        .cat-btn:hover { border-color: var(--acc); color: #fff; }
        .cat-btn.active { background: var(--acc); color: #000; font-weight: bold; border-color: #fff; }
        .cat-btn span { display: block; font-size: 11px; margin-top: 5px; }

        .search-box {
            width: 100%; background: rgba(255,255,255,0.07); border: 1px solid var(--brd);
            border-radius: 12px; padding: 14px; color: #fff; margin-bottom: 20px; outline: none; font-size: 14px;
        }
        .search-box:focus { border-color: var(--acc); background: rgba(255,255,255,0.1); }

        .ch-item {
            background: var(--card); border: 1px solid var(--brd); border-radius: 12px;
            padding: 16px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px;
            transition: 0.2s;
        }
        .ch-item:hover { background: var(--acc); color: #000; transform: scale(1.03); font-weight: bold; }
        .ch-item b { color: var(--acc); }
        .ch-item:hover b { color: #000; }

        .welcome-msg { text-align: center; z-index: 2; pointer-events: none; }
        .welcome-msg img { max-width: 350px; opacity: 0.25; margin-bottom: 30px; }
        .welcome-msg h2 { font-weight: 300; letter-spacing: 1px; opacity: 0.8; }

        #loading { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--acc); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="toggleUI()">

    <!-- 1. شاشة الترحيب (تظهر عند الفتح) -->
    <div id="splash-screen">
        <img src="logo.png" alt="KBN Logo" class="splash-logo">
        <p style="margin-top:20px; color:var(--acc); letter-spacing:3px; font-size:12px;">جاري تشغيل KBN STREAM...</p>
    </div>

    <!-- 2. مشغل الفيديو الرئيسي -->
    <div class="player-container">
        <div id="loading">
            <div class="spinner"></div>
            <p style="margin-top:15px; font-size:12px;">جاري جلب البث...</p>
        </div>
        
        <div class="welcome-msg" id="welcome">
            <img src="logo.png" alt="KBN">
            <h2 style="color:var(--acc)">انقر في أي مكان لبدء المشاهدة</h2>
        </div>
        
        <video id="vid" autoplay playsinline></video>
    </div>

    <!-- 3. الهيدر (الشعار الصغير والحالة) -->
    <div class="header">
        <img src="logo.png" alt="KBN" class="header-logo">
        <div id="scanStatus" style="font-size:11px; background:rgba(0,210,255,0.1); padding:6px 18px; border-radius:20px; border:1px solid var(--acc); color:var(--acc)">
            KBN CINEMA MODE
        </div>
    </div>

    <!-- 4. الواجهة التفاعلية (القوائم) -->
    <div class="ui-overlay">
        <!-- قائمة الباقات (تتولد تلقائياً) -->
        <div class="sidebar" id="sidebar" onclick="event.stopPropagation()"></div>
        
        <!-- قائمة القنوات -->
        <div class="ch-list" id="chList" onclick="event.stopPropagation()">
            <input type="text" class="search-box" id="search" placeholder="ابحث عن قناتك المفضلة..." oninput="displayChannels()">
            <div id="channelsContainer"></div>
        </div>
    </div>

<script>
    // إخفاء شاشة الترحيب بعد التحميل
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('fade-out');
        }, 3000);
    });

    let hls = null;
    let currentChannels = [];

    // إظهار وإخفاء الواجهة
    function toggleUI() {
        document.body.classList.toggle('ui-visible');
    }

    function hideUI() {
        document.body.classList.remove('ui-visible');
    }

    // المحرك التلقائي: الربط بملف config.json وملفات m3u
    async function init() {
        const sidebar = document.getElementById('sidebar');
        const status = document.getElementById('scanStatus');
        
        try {
            const configRes = await fetch('config.json');
            if (!configRes.ok) throw new Error();
            const config = await configRes.json();
            
            let count = 0;
            sidebar.innerHTML = ""; // تنظيف القائمة

            for (const item of config.playlists) {
                try {
                    const checkFile = await fetch(`streams/${item.id}.m3u`, { method: 'HEAD' });
                    if (checkFile.ok) {
                        const btn = document.createElement('div');
                        btn.className = 'cat-btn';
                        btn.innerHTML = `<span>${item.flag}</span><span>${item.name}</span>`;
                        btn.onclick = (e) => { 
                            e.stopPropagation(); 
                            loadM3U(item.id, btn); 
                        };
                        sidebar.appendChild(btn);
                        count++;
                    }
                } catch(e) {}
            }
            status.innerText = `متصل | ${count} باقة جاهزة`;
        } catch (err) {
            status.innerText = "يرجى تشغيل السيرفر المحلي";
            console.error("Config file not found or server error.");
        }
    }

    // تحميل ملف القنوات المختار
    async function loadM3U(id, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(`streams/${id}.m3u`);
            const text = await res.text();
            parseM3U(text);
        } catch (e) {
            alert("فشل في تحميل ملف القنوات");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // تحليل ملف m3u
    function parseM3U(text) {
        const lines = text.split('\n');
        currentChannels = [];
        let name = "";
        lines.forEach(line => {
            line = line.trim();
            if (line.includes('#EXTINF:')) {
                name = line.split(',')[1] || "قناة غير معروفة";
            } else if (line.startsWith('http')) {
                currentChannels.push({ n: name, h: line });
            }
        });
        displayChannels();
    }

    // عرض القنوات في القائمة مع ميزة البحث
    function displayChannels() {
        const container = document.getElementById('channelsContainer');
        const query = document.getElementById('search').value.toLowerCase();
        container.innerHTML = '';
        
        const filtered = currentChannels.filter(c => c.n.toLowerCase().includes(query));
        
        filtered.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'ch-item';
            div.innerHTML = `<b>▶</b> <span>${ch.n}</span>`;
            div.onclick = (e) => { 
                e.stopPropagation(); 
                playChannel(ch.h); 
            };
            container.appendChild(div);
        });
    }

    // تشغيل القناة وإخفاء الواجهة فوراً
    function playChannel(url) {
        const vid = document.getElementById('vid');
        document.getElementById('welcome').style.display = 'none';
        
        if (hls) hls.destroy();
        
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
        } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
            vid.src = url;
            vid.play();
        }
        
        hideUI(); // العودة لوضع السينما
    }

    // بدء تشغيل النظام
    init();
</script>
</body>
</html>
