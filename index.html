<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر التلقائي</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0a0e1a;--sb:#111827;--card:#1a2235;--acc:#e63946;--txt:#f0f0f0;--brd:#2a3448;--hov:#1e3a5f}
        body{background:var(--bg);color:var(--txt);height:100vh;font-family:system-ui;overflow:hidden;display:flex;flex-direction:column}
        
        .header{background:var(--sb);border-bottom:1px solid var(--brd);padding:10px 15px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .main{display:flex;flex:1;overflow:hidden}
        
        /* القائمة الجانبية */
        .sidebar{width:100px;background:var(--sb);border-left:1px solid var(--brd);display:flex;flex-direction:column;gap:10px;padding:10px;overflow-y:auto}
        .cat-btn{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px 5px;text-align:center;cursor:pointer;transition:0.3s;display:none} /* مخفي حتى يتم التأكد من وجود الملف */
        .cat-btn.active{background:var(--acc);border-color:var(--acc)}
        .cat-btn span{display:block;font-size:11px;font-weight:bold;margin-top:5px}

        /* قائمة القنوات */
        .ch-list{width:260px;border-left:1px solid var(--brd);padding:15px;overflow-y:auto;background:rgba(255,255,255,0.02)}
        .search-box{width:100%;background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:10px;color:#fff;margin-bottom:15px;outline:none}
        .ch-item{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:0.2s}
        .ch-item:hover{background:var(--hov)}

        /* منطقة الفيديو */
        .player-container{flex:1;background:#000;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center}
        #vid{width:100%;height:100%;display:none;background:#000}
        .welcome{text-align:center;z-index:1}
        
        #loading{position:absolute;display:none;background:rgba(0,0,0,0.8);inset:0;flex-direction:column;align-items:center;justify-content:center;z-index:10}
        .spinner{width:40px;height:40px;border:4px solid #333;border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

    <div class="header">
        <strong style="font-size:18px">📺 نظام القنوات التلقائي</strong>
        <span id="scanStatus" style="font-size:10px; color:var(--acc)">جاري فحص المجلد...</span>
    </div>

    <div class="main">
        <div class="sidebar" id="sidebar">
            </div>

        <div class="ch-list">
            <input type="text" class="search-box" id="search" placeholder="بحث..." oninput="displayChannels()">
            <div id="channelsContainer"></div>
        </div>

        <div class="player-container">
            <div id="loading"><div class="spinner"></div></div>
            <div class="welcome" id="welcome"><h3>📡 اختر دولة لبدء العرض</h3></div>
            <video id="vid" controls autoplay playsinline></video>
        </div>
    </div>

<script>
    // قائمة الدول التي سيقوم الكود بالبحث عنها تلقائياً في مجلد streams
    // يمكنك إضافة أي اختصار دولة جديد هنا
    const countriesToScan = [
        { id: 'dz', name: 'الجزائر', flag: '🇩🇿' },
        { id: 'sa', name: 'السعودية', flag: '🇸🇦' },
        { id: 'qa', name: 'قطر', flag: '🇶🇦' },
        { id: 'ma', name: 'المغرب', flag: '🇲🇦' },
        { id: 'eg', name: 'مصر', flag: '🇪🇬' },
        { id: 'ps', name: 'فلسطين', flag: '🇵🇸' },
        { id: 'iq', name: 'العراق', flag: '🇮🇶' }
    ];

    let currentChannels = [];
    let hls = null;

    // وظيفة الفحص التلقائي عند فتح الملف
    async function autoScan() {
        const sidebar = document.getElementById('sidebar');
        const status = document.getElementById('scanStatus');
        let count = 0;

        for (const country of countriesToScan) {
            try {
                // يحاول الكود قراءة ملف m3u من مجلد streams
                const response = await fetch(`streams/${country.id}.m3u`);
                if (response.ok) {
                    const btn = document.createElement('div');
                    btn.className = 'cat-btn';
                    btn.style.display = 'block'; // يظهر الزر فقط إذا نجح الـ fetch
                    btn.innerHTML = `<span>${country.flag}</span><span>${country.name}</span>`;
                    btn.onclick = () => loadM3U(country.id, btn);
                    sidebar.appendChild(btn);
                    count++;
                }
            } catch (e) {
                // إذا لم يجد الملف يتخطاه بصمت
            }
        }
        status.innerText = count > 0 ? `تم العثور على ${count} ملفات` : "تأكد من تشغيل السيرفر المحلي";
    }

    async function loadM3U(id, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('loading').style.display = 'flex';

        try {
            const response = await fetch(`streams/${id}.m3u`);
            const data = await response.text();
            parseM3U(data);
        } catch (err) {
            console.error(err);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        currentChannels = [];
        let name = "";
        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                name = line.split(',')[1] || "قناة";
            } else if (line.startsWith('http')) {
                currentChannels.push({ n: name, h: line });
            }
        });
        displayChannels();
    }

    function displayChannels() {
        const container = document.getElementById('channelsContainer');
        const q = document.getElementById('search').value.toLowerCase();
        container.innerHTML = '';
        currentChannels.filter(c => c.n.toLowerCase().includes(q)).forEach(ch => {
            const div = document.createElement('div');
            div.className = 'ch-item';
            div.innerHTML = `<span>📺</span> <span>${ch.n}</span>`;
            div.onclick = () => play(ch.h);
            container.appendChild(div);
        });
    }

    function play(url) {
        const vid = document.getElementById('vid');
        document.getElementById('welcome').style.display = 'none';
        vid.style.display = 'block';
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
        } else {
            vid.src = url;
            vid.play();
        }
    }

    // بدء الفحص فور تحميل الصفحة
    window.onload = autoScan;
</script>
</body>
</html>
