<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBN | Full Screen Cinema</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#050a14;--sb:rgba(10, 14, 26, 0.95);--card:rgba(22, 27, 41, 0.8);--acc:#00d2ff;--txt:#f0f0f0;--brd:rgba(255,255,255,0.1)}
        
        body{background:#000;color:var(--txt);height:100vh;font-family:system-ui;overflow:hidden;}

        /* شاشة الترحيب */
        #splash-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 1s ease;
        }
        .splash-logo { max-width: 500px; width: 80%; filter: drop-shadow(0 0 30px var(--acc)); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .fade-out { opacity: 0; visibility: hidden; }

        /* منطقة مشغل الفيديو (ملء الشاشة) */
        .player-container {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background: #000; z-index: 1; display: flex; align-items: center; justify-content: center;
        }
        #vid { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* واجهة التحكم (القوائم) */
        .ui-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; pointer-events: none; /* لا تعيق النقر على الفيديو إلا عند ظهورها */
            transition: opacity 0.5s ease;
            opacity: 0; visibility: hidden;
        }
        body.ui-visible .ui-overlay { opacity: 1; visibility: visible; pointer-events: auto; }

        /* القائمة الجانبية (الباقات) */
        .sidebar {
            width: 110px; background: var(--sb); backdrop-filter: blur(10px);
            border-left: 1px solid var(--brd); display: flex; flex-direction: column;
            gap: 12px; padding: 20px 10px; overflow-y: auto;
            transform: translateX(100%); transition: transform 0.4s ease;
        }
        body.ui-visible .sidebar { transform: translateX(0); }

        /* قائمة القنوات */
        .ch-list {
            width: 300px; background: rgba(15, 20, 35, 0.9); backdrop-filter: blur(15px);
            border-left: 1px solid var(--brd); padding: 20px; overflow-y: auto;
            transform: translateX(100%); transition: transform 0.5s ease;
        }
        body.ui-visible .ch-list { transform: translateX(0); }

        /* الهيدر */
        .header {
            position: fixed; top: 0; right: 0; left: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            z-index: 110; transform: translateY(-100%); transition: transform 0.4s ease;
        }
        body.ui-visible .header { transform: translateY(0); }
        .header-logo { height: 40px; filter: drop-shadow(0 0 10px var(--acc)); }

        /* الأزرار والعناصر */
        .cat-btn {
            background: var(--card); border: 1px solid var(--brd); border-radius: 15px;
            padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { background: var(--acc); color: #000; font-weight: bold; }
        .cat-btn span { display: block; font-size: 11px; margin-top: 5px; }

        .search-box {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--brd);
            border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 20px; outline: none;
        }
        .ch-item {
            background: var(--card); border: 1px solid var(--brd); border-radius: 10px;
            padding: 15px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }
        .ch-item:hover { background: var(--acc); color: #000; transform: scale(1.02); }

        .welcome-msg { text-align: center; z-index: 2; pointer-events: none; }
        .welcome-msg img { max-width: 300px; opacity: 0.3; margin-bottom: 20px; }

        #loading { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
        .spinner { width: 50px; height: 50px; border: 5px solid #222; border-top-color: var(--acc); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="toggleUI(event)">

    <!-- شاشة الترحيب -->
    <div id="splash-screen">
        <img src="logo.png" alt="KBN" class="splash-logo">
    </div>

    <!-- مشغل الفيديو ملء الشاشة -->
    <div class="player-container">
        <div id="loading"><div class="spinner"></div></div>
        <div class="welcome-msg" id="welcome">
            <img src="logo.png" alt="KBN">
            <h2 style="color:var(--acc)">انقر في أي مكان لإظهار القنوات</h2>
        </div>
        <video id="vid" autoplay playsinline></video>
    </div>

    <!-- واجهة التحكم العائمة -->
    <div class="header">
        <img src="logo.png" alt="Logo" class="header-logo">
        <div id="scanStatus" style="font-size:12px; background:rgba(0,0,0,0.5); padding:5px 15px; border-radius:20px; border:1px solid var(--acc)">متصل</div>
    </div>

    <div class="ui-overlay">
        <div class="sidebar" id="sidebar" onclick="event.stopPropagation()">
            <!-- الباقات تظهر هنا -->
        </div>
        <div class="ch-list" id="chList" onclick="event.stopPropagation()">
            <input type="text" class="search-box" id="search" placeholder="بحث عن قناة..." oninput="displayChannels()">
            <div id="channelsContainer"></div>
        </div>
    </div>

<script>
    // إخفاء الترحيب
    setTimeout(() => document.getElementById('splash-screen').classList.add('fade-out'), 2500);

    let hls = null;
    let currentChannels = [];

    // إظهار/إخفاء الواجهة
    function toggleUI(e) {
        // إذا نقر المستخدم على الفيديو أو المساحة الفارغة
        document.body.classList.toggle('ui-visible');
    }

    function hideUI() {
        document.body.classList.remove('ui-visible');
    }

    // نفس وظائف المسح السابقة مع تعديل تجربة المستخدم
    const countries = [
        { id: 'dz', name: 'الجزائر', flag: '🇩🇿' },
        { id: 'sa', name: 'السعودية', flag: '🇸🇦' },
        { id: 'qa', name: 'قطر', flag: '🇶🇦' },
        { id: 'ma', name: 'المغرب', flag: '🇲🇦' },
        { id: 'eg', name: 'مصر', flag: '🇪🇬' },
        { id: 'ps', name: 'فلسطين', flag: '🇵🇸' }
    ];

    async function init() {
        const sidebar = document.getElementById('sidebar');
        for (const c of countries) {
            try {
                const res = await fetch(`streams/${c.id}.m3u`);
                if (res.ok) {
                    const btn = document.createElement('div');
                    btn.className = 'cat-btn';
                    btn.innerHTML = `<span>${c.flag}</span><span>${c.name}</span>`;
                    btn.onclick = (e) => { e.stopPropagation(); loadM3U(c.id, btn); };
                    sidebar.appendChild(btn);
                }
            } catch(e){}
        }
    }

    async function loadM3U(id, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('loading').style.display = 'flex';
        const res = await fetch(`streams/${id}.m3u`);
        const text = await res.text();
        parseM3U(text);
        document.getElementById('loading').style.display = 'none';
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        currentChannels = [];
        let name = "";
        lines.forEach(line => {
            if (line.includes('#EXTINF:')) name = line.split(',')[1];
            else if (line.startsWith('http')) currentChannels.push({n: name, h: line});
        });
        displayChannels();
    }

    function displayChannels() {
        const container = document.getElementById('channelsContainer');
        const q = document.getElementById('search').value.toLowerCase();
        container.innerHTML = '';
        currentChannels.filter(c => c.n.toLowerCase().includes(q)).forEach(ch => {
            const div = document.createElement('div');
            div.className = 'ch-item';
            div.innerHTML = `<b>▶</b> <span>${ch.n}</span>`;
            div.onclick = (e) => { e.stopPropagation(); play(ch.h); };
            container.appendChild(div);
        });
    }

    function play(url) {
        const vid = document.getElementById('vid');
        document.getElementById('welcome').style.display = 'none';
        
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
        } else {
            vid.src = url;
            vid.play();
        }
        
        // أهم خطوة: إخفاء القوائم فور اختيار القناة
        hideUI();
    }

    window.onload = init;
</script>
</body>
</html>
